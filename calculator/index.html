<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <header class="header">
                <h1>🔬 Scientific Calculator</h1>
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="deg" onclick="setAngleMode('deg')">DEG</button>
                    <button class="mode-btn" data-mode="rad" onclick="setAngleMode('rad')">RAD</button>
                </div>
            </header>

            <!-- Display -->
            <div class="display">
                <div class="memory-indicator" id="memoryIndicator"></div>
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
            </div>

            <!-- Scientific Buttons -->
            <div class="btn-container">
                <!-- Row 1: Memory & Clear -->
                <div class="btn-row">
                    <button class="btn memory" onclick="memoryClear()">MC</button>
                    <button class="btn memory" onclick="memoryRecall()">MR</button>
                    <button class="btn memory" onclick="memoryAdd()">M+</button>
                    <button class="btn memory" onclick="memorySubtract()">M−</button>
                    <button class="btn clear" onclick="clearAll()">AC</button>
                    <button class="btn clear-entry" onclick="backspace()">⌫</button>
                </div>

                <!-- Row 2: Trig Functions -->
                <div class="btn-row">
                    <button class="btn function" onclick="inputFunction('sin')">sin</button>
                    <button class="btn function" onclick="inputFunction('cos')">cos</button>
                    <button class="btn function" onclick="inputFunction('tan')">tan</button>
                    <button class="btn function" onclick="inputFunction('log')">log</button>
                    <button class="btn function" onclick="inputFunction('ln')">ln</button>
                    <button class="btn function" onclick="inputFunction('sqrt')">√</button>
                </div>

                <!-- Row 3: Inverse Trig & Powers -->
                <div class="btn-row">
                    <button class="btn function" onclick="inputFunction('asin')">sin⁻¹</button>
                    <button class="btn function" onclick="inputFunction('acos')">cos⁻¹</button>
                    <button class="btn function" onclick="inputFunction('atan')">tan⁻¹</button>
                    <button class="btn function" onclick="inputOperator('^')">xʸ</button>
                    <button class="btn function" onclick="inputFunction('square')">x²</button>
                    <button class="btn function" onclick="inputFunction('cube')">x³</button>
                </div>

                <!-- Row 4: Hyperbolic & More -->
                <div class="btn-row">
                    <button class="btn function" onclick="inputFunction('sinh')">sinh</button>
                    <button class="btn function" onclick="inputFunction('cosh')">cosh</button>
                    <button class="btn function" onclick="inputFunction('tanh')">tanh</button>
                    <button class="btn function" onclick="inputFunction('exp')">eˣ</button>
                    <button class="btn function" onclick="inputFunction('tenPow')">10ˣ</button>
                    <button class="btn function" onclick="inputFunction('inverse')">1/x</button>
                </div>

                <!-- Row 5: Constants & Brackets -->
                <div class="btn-row">
                    <button class="btn constant" onclick="inputConstant('pi')">π</button>
                    <button class="btn constant" onclick="inputConstant('e')">e</button>
                    <button class="btn function" onclick="inputFunction('factorial')">n!</button>
                    <button class="btn function" onclick="inputFunction('abs')">|x|</button>
                    <button class="btn bracket" onclick="inputBracket('(')">(</button>
                    <button class="btn bracket" onclick="inputBracket(')')">)</button>
                </div>

                <!-- Row 6: Numbers 7-9 -->
                <div class="btn-row">
                    <button class="btn number" onclick="inputNumber('7')">7</button>
                    <button class="btn number" onclick="inputNumber('8')">8</button>
                    <button class="btn number" onclick="inputNumber('9')">9</button>
                    <button class="btn operator" onclick="inputOperator('/')">÷</button>
                    <button class="btn operator" onclick="inputOperator('%')">mod</button>
                    <button class="btn function" onclick="inputFunction('cbrt')">∛</button>
                </div>

                <!-- Row 7: Numbers 4-6 -->
                <div class="btn-row">
                    <button class="btn number" onclick="inputNumber('4')">4</button>
                    <button class="btn number" onclick="inputNumber('5')">5</button>
                    <button class="btn number" onclick="inputNumber('6')">6</button>
                    <button class="btn operator" onclick="inputOperator('*')">×</button>
                    <button class="btn function" onclick="inputFunction('percent')">%</button>
                    <button class="btn function" onclick="inputFunction('floor')">⌊x⌋</button>
                </div>

                <!-- Row 8: Numbers 1-3 -->
                <div class="btn-row">
                    <button class="btn number" onclick="inputNumber('1')">1</button>
                    <button class="btn number" onclick="inputNumber('2')">2</button>
                    <button class="btn number" onclick="inputNumber('3')">3</button>
                    <button class="btn operator" onclick="inputOperator('-')">−</button>
                    <button class="btn function" onclick="inputFunction('ceil')">⌈x⌉</button>
                    <button class="btn function" onclick="inputFunction('round')">round</button>
                </div>

                <!-- Row 9: 0, decimal, equals -->
                <div class="btn-row">
                    <button class="btn number" onclick="toggleSign()">±</button>
                    <button class="btn number" onclick="inputNumber('0')">0</button>
                    <button class="btn number" onclick="inputDecimal()">.</button>
                    <button class="btn operator" onclick="inputOperator('+')">+</button>
                    <button class="btn equals" onclick="calculate()">=</button>
                    <button class="btn function" onclick="inputFunction('rand')">Rand</button>
                </div>
            </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel">
            <div class="history-header">
                <h3>📜 History</h3>
                <button class="btn-clear-history" onclick="clearHistory()">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <p class="no-history">No calculations yet</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
