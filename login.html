<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Dashboard</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">📊</div>
            </div>
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue to Smart Dashboard</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display: none;"></span>
                </button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <button class="btn-guest" onclick="continueAsGuest()">
                <span class="guest-icon">👤</span>
                Continue as Guest
            </button>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Create Account</a>
            </p>
        </div>

        <div class="auth-features">
            <h3>What you can do:</h3>
            <ul>
                <li>📊 Track your expenses</li>
                <li>📝 Take quick notes</li>
                <li>🍅 Use Pomodoro timer</li>
                <li>🧮 Scientific calculator</li>
                <li>🎤 Practice English speaking</li>
            </ul>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5500/api';

        // Check if already logged in
        (function() {
            const token = localStorage.getItem('token');
            if (token && token !== 'guest_token') {
                window.location.href = 'index.html';
            }
        })();

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoader = submitBtn.querySelector('.btn-loader');

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            btnLoader.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Remember me functionality
                    if (document.getElementById('rememberMe').checked) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }

                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showError(data.message || 'Invalid email or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Unable to connect to server. Try guest login or check if server is running.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnLoader.style.display = 'none';
            }
        }

        function continueAsGuest() {
            const user = {
                id: 'guest',
                name: 'Guest User',
                email: 'guest@smartdashboard.com'
            };

            localStorage.setItem('token', 'guest_token');
            localStorage.setItem('user', JSON.stringify(user));
            localStorage.setItem('isGuest', 'true');

            window.location.href = 'index.html';
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            successEl.style.display = 'none';
            errorEl.textContent = message;
            errorEl.style.display = 'block';

            // Shake animation
            errorEl.classList.add('shake');
            setTimeout(() => errorEl.classList.remove('shake'), 500);

            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            errorEl.style.display = 'none';
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        // Load remembered email
        document.addEventListener('DOMContentLoaded', () => {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
</body>
</html>
